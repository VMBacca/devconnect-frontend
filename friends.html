<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DevConnect - Friends</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <div class="container">
        <div class="logo">
          <a href="index.html">
            <img src="assets/images/devconnect_logo.png" alt="devconnect" />
          </a>
        </div>

        <div class="head-side">
          <div class="head-side-left">
            <div class="search-area">
              <form method="GET">
                <input type="search" placeholder="Search" name="s" />
              </form>
            </div>
          </div>

          <div class="head-side-right">
            <a href="profile.html" class="user-area">
              <div class="user-area-text" id="logged-user-name"></div>
              <div class="user-area-icon">
                <img
                  id="logged-user-avatar"
                  src="media/avatars/avatar_default.png"
                />
              </div>
            </a>

            <a href="#" class="user-logout" id="logout-btn">
              <img src="assets/images/power_white.png" />
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <section class="container main">
      <!-- MENU -->
      <aside class="mt-10">
        <nav>
          <a href="index.html">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/home-run.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Home</div>
            </div>
          </a>

          <a href="profile.html">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/user.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">My Profile</div>
            </div>
          </a>

          <a href="friends.html">
            <div class="menu-item active">
              <div class="menu-item-icon">
                <img src="assets/images/friends.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Friends</div>
              <div class="menu-item-badge" id="friends-count">0</div>
            </div>
          </a>

          <a href="photos.html">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/photo.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Photos</div>
            </div>
          </a>

          <div class="menu-splitter"></div>

          <a href="#">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/settings.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Settings</div>
            </div>
          </a>

          <a href="#" id="logout-btn-side">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/power.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Logout</div>
            </div>
          </a>
        </nav>
      </aside>

      <!-- FEED -->
      <section class="feed">
        <div class="row">
          <div class="box flex-1 border-top-flat">
            <div class="box-body">
              <div id="friends-cover" class="profile-cover"></div>

              <div class="profile-info m-20 row">
                <div class="profile-info-avatar">
                  <img
                    id="friends-avatar"
                    src="media/avatars/avatar_default.png"
                  />
                </div>

                <div class="profile-info-name">
                  <div id="friends-name" class="profile-info-name-text">
                    User
                  </div>

                  <div id="friends-city" class="profile-info-location">
                    City
                  </div>
                </div>

                <div class="profile-info-data row">
                  <div class="profile-info-item m-width-20">
                    <div id="friends-followers" class="profile-info-item-n">
                      0
                    </div>
                    <div class="profile-info-item-s">Followers</div>
                  </div>

                  <div class="profile-info-item m-width-20">
                    <div id="friends-following" class="profile-info-item-n">
                      0
                    </div>
                    <div class="profile-info-item-s">Following</div>
                  </div>

                  <div class="profile-info-item m-width-20">
                    <div id="friends-photos" class="profile-info-item-n">0</div>
                    <div class="profile-info-item-s">Photos</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="column">
            <div class="box">
              <div class="box-body">
                <div class="tabs">
                  <div class="tab-item active" data-for="followers">
                    Followers <span id="followers-total">(0)</span>
                  </div>

                  <div class="tab-item" data-for="following">
                    Following <span id="following-total">(0)</span>
                  </div>
                </div>

                <div class="tab-content">
                  <div class="tab-body active" data-item="followers">
                    <div id="followers-list"></div>
                  </div>

                  <div class="tab-body" data-item="following">
                    <div id="following-list"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/friends.js"></script>
    <script src="assets/js/post.js"></script>
  </body>
</html>
