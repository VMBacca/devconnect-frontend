<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <title>DevConnect - Sign In</title>

    <meta
      name="viewport"
      content="width=device-width,minimum-scale=1,initial-scale=1"
    />

    <link rel="stylesheet" href="assets/css/login.css" />
  </head>

  <body>
    <header>
      <div class="container">
        <a href="index.html">
          <img src="assets/images/devconnect_logo.png" alt="DevConnect" />
        </a>
      </div>
    </header>

    <section class="container main">
      <form method="POST">
        <input
          class="input"
          type="email"
          name="email"
          placeholder="Email address"
        />

        <input
          class="input"
          type="password"
          name="password"
          placeholder="Password"
        />

        <input class="button" type="submit" value="Sign In" />

        <a href="signup.html"> Don't have an account? Create one </a>
      </form>
    </section>

    <script src="assets/js/login.js"></script>
  </body>
</html>
