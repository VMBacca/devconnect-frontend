<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DevConnect - Sign Up</title>

    <meta
      name="viewport"
      content="width=device-width,minimum-scale=1,initial-scale=1"
    />

    <link rel="stylesheet" href="assets/css/login.css" />
  </head>

  <body>
    <header>
      <div class="container">
        <a href="index.html">
          <img src="assets/images/devconnect_logo.png" alt="DevConnect" />
        </a>
      </div>
    </header>

    <section class="container main">
      <form id="signup-form">
        <input class="input" type="text" name="name" placeholder="Full name" />

        <input
          class="input"
          type="email"
          name="email"
          placeholder="Email address"
        />

        <input
          class="input"
          type="password"
          name="password"
          placeholder="Password"
        />

        <input class="input" type="date" name="birthdate" />

        <div class="avatar-style-group">
          <label class="avatar-style-title">Choose your avatar style</label>

          <label class="radio-option">
            <input type="radio" name="avatarStyle" value="male" checked />
            Masculine
          </label>

          <label class="radio-option">
            <input type="radio" name="avatarStyle" value="female" />
            Feminine
          </label>
        </div>

        <input class="button" type="submit" value="Create Account" />

        <a href="login.html"> Already have an account? Sign In </a>
      </form>
    </section>

    <script src="assets/js/signup.js"></script>
  </body>
</html>
