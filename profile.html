<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DevConnect - Profile</title>
    <meta
      name="viewport"
      content="width=device-width,minimum-scale=1,initial-scale=1"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <a href="index.html" onclick="window.location.href = 'index.html'">
            <img src="assets/images/devconnect_logo.png" alt="devconnect" />
          </a>
        </div>
        <div class="head-side">
          <div class="head-side-left">
            <div class="search-area">
              <form method="GET">
                <input type="search" placeholder="Search" name="s" />
              </form>
            </div>
          </div>
          <div class="head-side-right">
            <a href="" class="user-area">
              <div id="header-user-name" class="user-area-text">Bonieky</div>

              <div class="profile-info-avatar">
                <img
                  id="header-avatar"
                  src="media/avatars/avatar_default.png"
                />
              </div>
            </a>

            <a href="" class="user-logout" id="logout-btn">
              <img src="assets/images/power_white.png" />
            </a>
          </div>
        </div>
      </div>
    </header>
    <section class="container main">
      <aside class="mt-10">
        <nav>
          <a href="index.html" onclick="window.location.href = 'index.html'">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/home-run.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Home</div>
            </div>
          </a>
          <a
            href="profile.html"
            onclick="window.location.href = 'profile.html'"
          >
            <div class="menu-item active">
              <div class="menu-item-icon">
                <img src="assets/images/user.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">My Profile</div>
            </div>
          </a>
          <a href="friends.html">
            <div class="menu-item active">
              <div class="menu-item-icon">
                <img src="assets/images/friends.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Friends</div>
              <div class="menu-item-badge" id="friends-count">0</div>
            </div>
          </a>
          <a href="photos.html" onclick="window.location.href = 'photos.html'">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/photo.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Photos</div>
            </div>
          </a>
          <div class="menu-splitter"></div>
          <a href="">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/settings.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Settings</div>
            </div>
          </a>
          <a href="#" id="logout-btn-side">
            <div class="menu-item">
              <div class="menu-item-icon">
                <img src="assets/images/power.png" width="16" height="16" />
              </div>
              <div class="menu-item-text">Logout</div>
            </div>
          </a>
        </nav>
      </aside>
      <section class="feed">
        <div class="row">
          <div class="box flex-1 border-top-flat">
            <div class="box-body">
              <div id="profile-cover" class="profile-cover">
                <input
                  type="file"
                  id="cover-upload"
                  accept="image/*"
                  style="display: none"
                />
              </div>
              <div class="profile-info m-20 row">
                <div class="profile-info-avatar">
                  <img
                    id="profile-avatar-main"
                    class="profile-avatar"
                    src="media/avatars/avatar_default.png"
                  />
                  <input
                    type="file"
                    id="avatar-upload"
                    accept="image/*"
                    style="display: none"
                  />
                </div>
                <div class="profile-info-name">
                  <div id="profile-name" class="profile-info-name-text">
                    Nome
                  </div>
                  <div id="profile-city" class="profile-info-location">
                    City
                  </div>
                </div>
                <div class="profile-info-data row">
                  <div class="profile-info-item m-width-20">
                    <div id="followers-count" class="profile-info-item-n">
                      129
                    </div>
                    <div class="profile-info-item-s">Followers</div>
                  </div>
                  <div class="profile-info-item m-width-20">
                    <div id="following-count" class="profile-info-item-n">
                      363
                    </div>
                    <div class="profile-info-item-s">Following</div>
                  </div>
                  <div class="profile-info-item m-width-20">
                    <div id="photos-count" class="profile-info-item-n">12</div>
                    <div class="profile-info-item-s">Photos</div>
                  </div>
                </div>

                <div id="follow-area"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="column side pr-5">
            <div class="box">
              <div class="box-body">
                <div class="user-info-mini">
                  <img src="assets/images/calendar.png" />
                  <span id="profile-birthdate"></span>
                </div>

                <div class="user-info-mini">
                  <img src="assets/images/pin.png" />
                  <span id="profile-city-full"></span>
                </div>

                <div class="user-info-mini">
                  <img src="assets/images/work.png" />
                  <span id="profile-work"></span>
                </div>
              </div>
            </div>

            <div class="box">
              <div class="box-header m-10">
                <div class="box-header-text">
                  Following
                  <span id="following-total">(0)</span>
                </div>
                <div class="box-header-buttons">
                  <a
                    class="see-all-link"
                    href="friends.html"
                    onclick="window.location.href = 'friends.html'"
                  >
                    See All
                  </a>
                </div>
              </div>
              <div class="box-body friend-list" id="following-list"></div>
            </div>
          </div>
          <div class="column pl-5">
            <div class="box">
              <div class="box-header m-10">
                <div class="box-header-text">
                  Photos
                  <span id="photos-box-count">(0)</span>
                </div>
                <div class="box-header-buttons">
                  <a
                    class="see-all-link"
                    href="photos.html"
                    onclick="window.location.href = 'photos.html'"
                  >
                    See All
                  </a>
                </div>
              </div>
              <div id="profile-photos" class="box-body row m-20"></div>
            </div>

            <div id="profile-posts"></div>
          </div>
        </div>
      </section>
    </section>
    <div class="modal" id="photo-modal" onclick="closePhotoModal()">
      <div class="modal-inner" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closePhotoModal()"> &times; </span>

        <div class="modal-content">
          <img id="modal-photo" class="gallery-photo-full" />
        </div>
      </div>
    </div>
    <script type="text/javascript" src="assets/js/vanillaModal.js"></script>
    <script src="assets/js/post.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
